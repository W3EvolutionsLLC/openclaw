name: Sync from Owner (only changes)

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-from-owner
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync only changed refs (git only)
        env:
          UPSTREAM_OWNER: ${{ secrets.OC_UPSTREAM_OWNER }}
          UPSTREAM_REPO: ${{ secrets.OC_UPSTREAM_REPO }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEST_REPO: ${{ github.repository }}
          # Set to "true" if you want to delete branches/tags in Fork that upstream deleted:
          PRUNE_DELETIONS: "true"
        run: |
          set -euo pipefail
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

          mkdir -p repo
          cd repo
          git init --bare

          git remote add upstream "https://github.com/${UPSTREAM_OWNER}/${UPSTREAM_REPO}.git"
          git remote add dest "https://x-access-token:${GH_TOKEN}@github.com/${DEST_REPO}.git"

          # Fetch upstream branches + tags
          git fetch upstream --prune --tags '+refs/heads/*:refs/remotes/upstream/*'

          # Build a map of dest branch tips: name -> sha
          declare -A DEST_BRANCH_SHA
          while read -r sha ref; do
            b="${ref#refs/heads/}"
            DEST_BRANCH_SHA["$b"]="$sha"
          done < <(git ls-remote --heads dest)

          # Push only branches whose SHA differs
          mapfile -t UP_BRANCHES < <(git for-each-ref --format='%(refname:strip=3)' refs/remotes/upstream)
          for b in "${UP_BRANCHES[@]}"; do
            up_sha="$(git rev-parse "refs/remotes/upstream/$b")"
            dst_sha="${DEST_BRANCH_SHA[$b]:-}"

            if [[ "$up_sha" == "$dst_sha" ]]; then
              echo "Branch unchanged, skipping: $b"
              continue
            fi

            echo "Branch changed, pushing: $b ($dst_sha -> $up_sha)"
            git push dest "+refs/remotes/upstream/$b:refs/heads/$b"
          done

          # Optionally prune deleted branches in dest (only if they truly don't exist upstream)
          if [[ "${PRUNE_DELETIONS}" == "true" ]]; then
            # Build an upstream set for fast membership checks
            UP_SET=" ${UP_BRANCHES[*]} "
            while read -r _ ref; do
              b="${ref#refs/heads/}"
              if [[ "$UP_SET" != *" $b "* ]]; then
                echo "Upstream deleted branch, deleting in dest: $b"
                git push dest ":refs/heads/$b"
              fi
            done < <(git ls-remote --heads dest)
          fi

          # ---- Tags: push only changed/new tags; optionally delete removed tags ----
          declare -A DEST_TAG_SHA
          while read -r sha ref; do
            t="${ref#refs/tags/}"
            DEST_TAG_SHA["$t"]="$sha"
          done < <(git ls-remote --tags dest | awk '$2 ~ /^refs\/tags\// {print}')

          mapfile -t UP_TAGS < <(git for-each-ref --format='%(refname:strip=2)' refs/tags)

          for t in "${UP_TAGS[@]}"; do
            up_sha="$(git rev-parse "refs/tags/$t^{commit}" 2>/dev/null || true)"
            dst_sha="${DEST_TAG_SHA[$t]:-}"

            # If we can't resolve, just attempt push (rare edge cases)
            if [[ -z "${up_sha}" ]]; then
              echo "Tag unresolved locally, pushing anyway: $t"
              git push dest "+refs/tags/$t:refs/tags/$t"
              continue
            fi

            if [[ "$up_sha" == "$dst_sha" ]]; then
              echo "Tag unchanged, skipping: $t"
              continue
            fi

            echo "Tag changed/new, pushing: $t ($dst_sha -> $up_sha)"
            git push dest "+refs/tags/$t:refs/tags/$t"
          done

          if [[ "${PRUNE_DELETIONS}" == "true" ]]; then
            UP_TAG_SET=" ${UP_TAGS[*]} "
            while read -r _ ref; do
              t="${ref#refs/tags/}"
              # Skip deref lines like refs/tags/v1.0^{}
              if [[ "$t" == *"^{}" ]]; then
                continue
              fi
              if [[ "$UP_TAG_SET" != *" $t "* ]]; then
                echo "Upstream deleted tag, deleting in dest: $t"
                git push dest ":refs/tags/$t"
              fi
            done < <(git ls-remote --tags dest | awk '$2 ~ /^refs\/tags\// {print}')
          fi
